name: Build ciadpi for Lexra
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Toolchain and Packages
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk git gettext libssl-dev xsltproc wget unzip python3

      - name: Clone OpenWrt Build System
        run: |
          # Клонируем официальную систему сборки OpenWrt
          git clone --depth 1 https://github.com
          cd openwrt
          # Добавляем репозиторий пакетов сообщества, где есть ByeDPI
          echo "src-git packages https://github.com" > feeds.conf
          ./scripts/feeds update -a
          ./scripts/feeds install byedpi

      - name: Configure Target Architecture
        run: |
          cd openwrt
          # Жестко задаем архитектуру Realtek (Lexra)
          echo "CONFIG_TARGET_realtek=y" > .config
          echo "CONFIG_TARGET_realtek_generic=y" >> .config
          echo "CONFIG_PACKAGE_byedpi=y" >> .config
          make defconfig

      - name: Compile ByeDPI Package
        run: |
          cd openwrt
          # Компилируем конкретно пакет byedpi
          make package/byedpi/compile V=s

      - name: Find and Prepare Binary
        run: |
          mkdir -p output
          # Ищем скомпилированный бинарник ciadpi внутри структуры сборки
          find openwrt/build_dir/ -name "ciadpi" -type f -exec cp {} output/ciadpi-lexra \;

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: my-ciadpi
          path: output/ciadpi-lexra
