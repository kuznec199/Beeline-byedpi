name: Build ciadpi for Lexra
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download ByeDPI Archive
        run: |
          curl -L https://github.com/hufrea/byedpi/archive/refs/heads/main.zip -o byedpi.zip
          unzip byedpi.zip
          mv byedpi-main/* .

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mips-linux-gnu

      - name: Compile
        run: |
          make CC=mips-linux-gnu-gcc CFLAGS="-march=mips32 -mtune=mips32 -msoft-float -O2" LDFLAGS="-static" TARGET=linux
          mkdir -p output
          mv ciadpi output/ciadpi-lexra

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: my-ciadpi
          path: output/ciadpi-lexra
