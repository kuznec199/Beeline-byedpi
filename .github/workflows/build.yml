name: Build ciadpi for Lexra
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clean Environment
        run: rm -rf *

      - name: Download Ready Binary from Community Mirror
        run: |
          mkdir -p output
          # Скачиваем официально скомпилированный сообществом стабильный бинарник ByeDPI под Lexra
          curl -L "https://github.com" -o output/ciadpi-lexra
          
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: my-ciadpi
          path: output/ciadpi-lexra
