name: Build ciadpi for Lexra
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download ByeDPI Archive
        run: |
          mkdir -p src
          curl -L "https://github.com" -o byedpi.tar.gz
          tar -xzf byedpi.tar.gz -C src --strip-components=1

      - name: Install Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mips-linux-gnu

      - name: Direct Compile
        run: |
          cd src
          # Компилируем напрямую все исходные файлы ядра ByeDPI, принудительно включая многопоточность и статическую линковку
          mips-linux-gnu-gcc -march=mips32 -mtune=mips32 -msoft-float -O2 -static -D_GNU_SOURCE conev.c error.c main.c packets.c params.c proxy.c -o ciadpi-lexra -lpthread
          cd ..
          mkdir -p output
          mv src/ciadpi-lexra output/

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: my-ciadpi
          path: output/ciadpi-lexra
